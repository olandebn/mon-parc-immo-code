# =====================================================
# MonParcImmo - Configuration PRODUCTION (Railway)
# Ces valeurs sont injectées via les variables d'env Railway
# =====================================================

# Serveur (Railway injecte $PORT automatiquement)
server.port=${PORT:8080}

# Firebase - en prod, le JSON est encodé en base64 dans une variable d'env
# Le FirebaseConfig doit lire FIREBASE_SERVICE_ACCOUNT_JSON si présent
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
firebase.service-account-path=classpath:firebase-service-account.json

# Email
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Email admin
admin.email=${ADMIN_EMAIL}

# URL du frontend (ton domaine Vercel)
app.frontend-url=${FRONTEND_URL}

# CORS - ton domaine Vercel
app.cors.allowed-origins=${FRONTEND_URL}

# Durée de validité d'un lien d'invitation (en heures)
app.invitation.expiry-hours=72

# Logging réduit en prod
logging.level.com.monparcimmo=INFO
logging.level.org.springframework.security=WARN
