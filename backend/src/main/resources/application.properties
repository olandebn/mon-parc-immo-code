# =====================================================
# MonParcImmo - Configuration Spring Boot
# =====================================================

# Serveur
server.port=8080

# Firebase - chemin vers le fichier de clé de service
# Télécharger depuis Firebase Console > Paramètres du projet > Comptes de service
firebase.service-account-path=classpath:firebase-service-account.json

# Email (configurer avec ton fournisseur SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=TON_EMAIL@gmail.com
spring.mail.password=TON_MOT_DE_PASSE_APPLICATION
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Email admin (pour recevoir les notifications de réservation)
admin.email=ADMIN@monparcimmo.fr

# URL du frontend (pour les liens dans les emails)
app.frontend-url=http://localhost:3000

# CORS - origines autorisées
app.cors.allowed-origins=http://localhost:3000

# Durée de validité d'un lien d'invitation (en heures)
app.invitation.expiry-hours=72

# Logging
logging.level.com.monparcimmo=DEBUG
