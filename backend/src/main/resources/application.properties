# =====================================================
# MonParcImmo - Configuration Spring Boot
# =====================================================

# Serveur
server.port=8080

# Firebase - chemin vers le fichier de clé de service
# Télécharger depuis Firebase Console > Paramètres du projet > Comptes de service
firebase.service-account-path=classpath:firebase-service-account.json

# ─────────────────────────────────────────────────────────
# Email — Notifications automatiques
# ─────────────────────────────────────────────────────────
# Pour activer les emails, créer un "Mot de passe d'application" Gmail :
#   1. Aller sur myaccount.google.com > Sécurité > Validation en 2 étapes (activer)
#   2. Chercher "Mots de passe des applications" > Créer > Copier le code 16 caractères
#   3. Coller ce code dans spring.mail.password ci-dessous (sans espaces)
#
# Si non configuré, les réservations fonctionnent toujours — seuls les emails sont ignorés.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=TON_EMAIL@gmail.com
spring.mail.password=SEIZE_CARACTERES_MOT_DE_PASSE_APP
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email du gérant (reçoit les alertes de nouvelle réservation)
admin.email=TON_EMAIL@gmail.com

# URL du frontend (pour les liens dans les emails)
app.frontend-url=http://localhost:3000

# CORS - origines autorisées
app.cors.allowed-origins=http://localhost:3000

# Durée de validité d'un lien d'invitation (en heures)
app.invitation.expiry-hours=72

# Logging
logging.level.com.monparcimmo=DEBUG
